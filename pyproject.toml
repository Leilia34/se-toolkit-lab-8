[tool.uv.workspace]
members = ["backend", "mcp", "qwen-code-api", "nanobot", "nanobot-websocket-channel/nanobot-webchat", "nanobot-websocket-channel/nanobot-channel-protocol"]

[tool.uv.sources]
lms-mcp = { workspace = true }
nanobot-webchat = { workspace = true }
nanobot-channel-protocol = { workspace = true }

[dependency-groups]
dev = [
  "poethepoet>=0.40.0",
  "pyright==1.1.408",
  "pyright==1.1.408",
  "pytest==9.0.2",
  "pytest-asyncio>=0.25.0",
  "ruff==0.14.14",
  "ty==0.0.13",
]

[tool.ruff]
exclude = ["qwen-code-api"]

[tool.ruff.lint]
select = ["RET503"]
